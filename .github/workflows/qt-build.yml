name: Build Qt App

on:
  push:
    branches:
      - main
      - master
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build-qt-linux:
    name: Build Qt App on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-tools-dev g++ cmake

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: Build
        run: |
          cmake --build build

      - name: Deploy Qt dependencies
        run: |
          chmod +x package/linux/deploy.sh
          ./package/linux/deploy.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qt-build-linux
          path: |
            build/DailyReport
            package/linux/DailyReport

  build-qt-windows:
    name: Build Qt App on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.3'
          args: '--donotinstallupdatedcomponents'

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" ..
        shell: pwsh

      - name: Build
        run: |
          cmake --build build --config Release
        shell: pwsh

      - name: Deploy Qt dependencies
        run: |
          # Use windeployqt to copy Qt dependencies automatically
          # This handles all DLLs including the correct SSL versions
          $qtPath = $env:QT_ROOT_DIR
          Write-Host "Qt install dir: $qtPath"
          $sourceDir = "build/Release"
          $targetDir = "qt-deploy"
          mkdir $targetDir -Force

          # Copy executable to target directory
          Copy-Item "$sourceDir\DailyReport.exe" -Destination $targetDir -Force

          # Use windeployqt for automatic dependency resolution
          # Qt 6.4.3 uses libcrypto-1_1.dll and libssl-1_1.dll
          # Qt 6.5+ uses libcrypto-3.dll and libssl-3.dll
          $windeployqt = "$qtPath\bin\windeployqt.exe"
          if (Test-Path $windeployqt) {
            Write-Host "Running windeployqt..."
            & $windeployqt --dir $targetDir $targetDir\DailyReport.exe
          } else {
            Write-Host "windeployqt not found, using manual copy..."
            Copy-Item "$qtPath\bin\Qt6Core.dll" -Destination $targetDir -Force
            Copy-Item "$qtPath\bin\Qt6Widgets.dll" -Destination $targetDir -Force
            Copy-Item "$qtPath\bin\Qt6Gui.dll" -Destination $targetDir -Force
            Copy-Item "$qtPath\bin\Qt6Network.dll" -Destination $targetDir -Force
            # Try both possible SSL DLL names
            if (Test-Path "$qtPath\bin\libcrypto-3.dll") {
              Copy-Item "$qtPath\bin\libcrypto-3.dll" -Destination $targetDir -Force
              Copy-Item "$qtPath\bin\libssl-3.dll" -Destination $targetDir -Force
            } elseif (Test-Path "$qtPath\bin\libcrypto-1_1.dll") {
              Copy-Item "$qtPath\bin\libcrypto-1_1.dll" -Destination $targetDir -Force
              Copy-Item "$qtPath\bin\libssl-1_1.dll" -Destination $targetDir -Force
            }
            # Copy platform plugin
            mkdir "$targetDir\platforms" -Force
            Copy-Item "$qtPath\plugins\platforms\qwindows.dll" -Destination "$targetDir\platforms\" -Force
          }
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qt-build-windows
          path: |
            qt-deploy/

  build-qt-macos:
    name: Build Qt App on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.0'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          args: '--donotinstallupdatedcomponents'

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: Build
        run: |
          cmake --build build

      - name: Deploy Qt dependencies
        run: |
          # Use macdeployqt to create app bundle with dependencies
          qtPath="${QT_ROOT_DIR}"
          echo "Qt install dir: $qtPath"

          # Create app bundle directory structure
          appBundle="build/DailyReport.app"
          mkdir -p "$appBundle/Contents/MacOS"
          mkdir -p "$appBundle/Contents/Resources"

          # Copy executable
          cp build/DailyReport "$appBundle/Contents/MacOS/"

          # Create Info.plist
          cat > "$appBundle/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>DailyReport</string>
              <key>CFBundleIdentifier</key>
              <string>com.dailyreport.app</string>
              <key>CFBundleName</key>
              <string>DailyReport</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
          </dict>
          </plist>
          EOF

          # Run macdeployqt to bundle Qt libraries
          macdeployqt="$qtPath/bin/macdeployqt"
          if [ -f "$macdeployqt" ]; then
            echo "Running macdeployqt..."
            "$macdeployqt" "$appBundle" -dmg
          else
            echo "macdeployqt not found, copying Qt libraries manually..."
            # Copy Qt frameworks
            mkdir -p "$appBundle/Contents/Frameworks"
            for framework in QtCore QtWidgets QtGui QtNetwork; do
              if [ -d "$qtPath/lib/${framework}.framework" ]; then
                cp -R "$qtPath/lib/${framework}.framework" "$appBundle/Contents/Frameworks/"
              fi
            done
          fi

          # Create zip for artifact upload
          cd build && zip -r DailyReport-macos.zip DailyReport.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qt-build-macos
          path: |
            build/DailyReport.app
            build/DailyReport-macos.zip
            build/*.dmg
