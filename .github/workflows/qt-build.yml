name: Build Qt App

on:
  push:
    branches:
      - main
      - master
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build-qt-linux:
    name: Build Qt App on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-tools-dev g++ cmake

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: Build
        run: |
          cmake --build build

      - name: Deploy Qt dependencies
        run: |
          chmod +x package/linux/deploy.sh
          ./package/linux/deploy.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qt-build-linux
          path: |
            build/DailyReport
            package/linux/DailyReport

  build-qt-windows:
    name: Build Qt App on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.4.3'
          args: '--donotinstallupdatedcomponents'

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" ..
        shell: pwsh

      - name: Build
        run: |
          cmake --build build --config Release
        shell: pwsh

      - name: Deploy Qt dependencies
        run: |
          # Copy Qt DLLs to build directory
          $qtPath = $env:QT_ROOT_DIR
          Write-Host "Qt install dir: $qtPath"
          $targetDir = "build/Release"
          mkdir $targetDir -Force
          Copy-Item "$qtPath\bin\Qt6Core.dll" -Destination $targetDir -Force
          Copy-Item "$qtPath\bin\Qt6Widgets.dll" -Destination $targetDir -Force
          Copy-Item "$qtPath\bin\Qt6Gui.dll" -Destination $targetDir -Force
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qt-build-windows
          path: |
            build/Release/

  build-qt-macos:
    name: Build Qt App on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        run: |
          brew install qt@6

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: Build
        run: |
          cmake --build build

      - name: Deploy Qt dependencies
        run: |
          # TODO: Implement macOS deployment
          echo "macOS deployment not implemented yet"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qt-build-macos
          path: |
            build/DailyReport
