name: Build Qt App

on:
  push:
    branches:
      - main
      - master
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build-qt-linux:
    name: Build Qt App on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-tools-dev g++ cmake

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: Build
        run: |
          cmake --build build

      - name: Deploy Qt dependencies
        run: |
          chmod +x package/linux/deploy.sh
          ./package/linux/deploy.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qt-build-linux
          path: |
            build/DailyReport
            package/linux/DailyReport
